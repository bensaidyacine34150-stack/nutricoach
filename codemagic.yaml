workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yacine.nutricoach
      groups:
        - app_store
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor
        script: npm install -g @capacitor/cli
      - name: Create www directory
        script: mkdir -p www && cp index.html www/
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
    - name: Fix signing
        script: |
          cd ios/App
          cat >> Podfile << 'EOF'
          
post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
      config.build_settings['CODE_SIGN_IDENTITY'] = ''
      config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
    end
  end
end
EOF
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -archivePath ios/App/App.xcarchive \
          DEVELOPMENT_TEAM=PZN5YABHWZ \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution: Yacine Bensaid (PZN5YABHWZ)" \
          PROVISIONING_PROFILE_SPECIFIER="NutriCoach Distribution" \
          archive \
          -destination "generic/platform=iOS"
      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>PZN5YABHWZ</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.yacine.nutricoach</key>
                  <string>NutriCoach Distribution</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
          -archivePath ios/App/App.xcarchive \
          -exportPath ios/App/export \
          -exportOptionsPlist /tmp/ExportOptions.plist
      - name: Upload to App Store
        script: |
          echo "$APP_STORE_KEY_CONTENT" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8
          xcrun altool --upload-app \
          --type ios \
          --file ios/App/export/App.ipa \
          --apiKey $KEY_ID \
          --apiIssuer $ISSUER_ID \
          --private-key /tmp/AuthKey.p8
    artifacts:
      - ios/App/export/*.ipa
