workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yacine.nutricoach
      groups:
        - app_store
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor
        script: npm install -g @capacitor/cli
      - name: Create www directory
        script: mkdir -p www && cp index.html www/
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Fix Pods signing
        script: |
          find ios/App/Pods -name "*.pbxproj" -exec sed -i '' 's/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g' {} \; || true
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -archivePath ios/App/App.xcarchive \
          DEVELOPMENT_TEAM=PZN5YABHWZ \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution: Yacine Bensaid (PZN5YABHWZ)" \
          PROVISIONING_PROFILE_SPECIFIER="NutriCoach Distribution" \
          archive \
          -destination "generic/platform=iOS"
      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID
