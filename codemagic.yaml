workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yacine.nutricoach
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Install Capacitor
        script: npm install -g @capacitor/cli
      - name: Create www directory
        script: mkdir -p www && cp index.html www/
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Fix Podfile signing
        script: |
          cd ios/App
          ruby -e "
            content = File.read('Podfile')
            content.gsub!(/post_install do \|installer\|/, 'post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"
                config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"
                config.build_settings[\"CODE_SIGN_IDENTITY\"] = \"\"
              end
            end')
            File.write('Podfile', content)
          "
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Create ExportOptions.plist
        script: |
          cat > ios/App/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>PZN5YABHWZ</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.yacine.nutricoach</key>
                  <string>NutriCoach Distribution</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -archivePath ios/App/App.xcarchive \
          DEVELOPMENT_TEAM=PZN5YABHWZ \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="NutriCoach Distribution" \
          archive \
          -allowProvisioningUpdates \
          -destination "generic/platform=iOS"
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
          -archivePath ios/App/App.xcarchive \
          -exportPath ios/App/export \
          -exportOptionsPlist ios/App/ExportOptions.plist \
          -allowProvisioningUpdates
    artifacts:
      - ios/App/export/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: F63VFB7L7F
        issuer_id: a4edd9ef-1ccf-429a-8f8f-49950b9207f8
        submit_to_testflight: false
        submit_to_app_store: true
