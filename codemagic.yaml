workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yacine.nutricoach
      vars:
        KEY_ID: F63VFB7L7F
        ISSUER_ID: a4edd9ef-1ccf-429a-8f8f-49950b9207f8
      groups:
        - app_store
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor
        script: npm install -g @capacitor/cli
      - name: Create www directory
        script: mkdir -p www && cp index.html www/
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -archivePath ios/App/App.xcarchive \
          DEVELOPMENT_TEAM=PZN5YABHWZ \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          PROVISIONING_PROFILE_SPECIFIER="NutriCoach Distribution" \
          archive \
          -allowProvisioningUpdates \
          -destination "generic/platform=iOS"
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
          -archivePath ios/App/App.xcarchive \
          -exportPath ios/App/export \
          -exportOptionsPlist ios/App/ExportOptions.plist \
          -allowProvisioningUpdates
      - name: Upload to App Store
        script: |
          echo "$APP_STORE_KEY_CONTENT" > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8
          xcrun altool --upload-app \
          --type ios \
          --file ios/App/export/App.ipa \
          --apiKey F63VFB7L7F \
          --apiIssuer a4edd9ef-1ccf-429a-8f8f-49950b9207f8 \
          --private-key /tmp/AuthKey.p8
    artifacts:
      - ios/App/export/*.ipa
