workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.yacine.nutricoach
      groups:
        - app_store
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Install Capacitor
        script: npm install -g @capacitor/cli
      - name: Create www directory
        script: mkdir -p www && cp index.html www/
      - name: Add iOS platform
        script: |
          rm -rf ios
          npx cap add ios
      - name: Copy icon
        script: |
          mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset/
          curl -L "https://raw.githubusercontent.com/bensaidyacine34150-stack/nutricoach/main/icon.png" -o ios/App/App/Assets.xcassets/AppIcon.appiconset/Icon-1024.png
          cat > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
          {
            "images": [
              {
                "filename": "Icon-1024.png",
                "idiom": "universal",
                "platform": "ios",
                "size": "1024x1024"
              }
            ],
            "info": {
              "author": "xcode",
              "version": 1
            }
          }
          EOF
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('Pods/Pods.xcodeproj')
            project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
              end
            end
            project.save
          "
      - name: Build iOS
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -archivePath /tmp/App.xcarchive \
          DEVELOPMENT_TEAM=PZN5YABHWZ \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution: Yacine Bensaid (PZN5YABHWZ)" \
          PROVISIONING_PROFILE_SPECIFIER="NutriCoach Distribution" \
          CURRENT_PROJECT_VERSION=$(date +%s) \
          MARKETING_VERSION=1.0 \
          archive \
          -destination "generic/platform=iOS"
      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>PZN5YABHWZ</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.yacine.nutricoach</key>
                  <string>NutriCoach Distribution</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
          -archivePath /tmp/App.xcarchive \
          -exportPath /tmp/export \
          -exportOptionsPlist /tmp/ExportOptions.plist
      - name: Upload to App Store
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          cat > ~/.appstoreconnect/private_keys/AuthKey_4DFLDHAY64.p8 << 'EOF'
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQg3k6jLpgZLoWy6ScU
          6cs9p3acxdNDC3ugX5XpwYHyCnSgCgYIKoZIzj0DAQehRANCAASy1Syfo8DIvy0G
          cqKlOJaNLsGaJSNHCc8D0DalvWgO7OO7SulLNQk5bEL99Hl/zUQGMQs7/zGnUWdv
          bmOFngsr
          -----END PRIVATE KEY-----
          EOF
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_4DFLDHAY64.p8
          xcrun altool --upload-app \
          --type ios \
          --file /tmp/export/App.ipa \
          --apiKey 4DFLDHAY64 \
          --apiIssuer a4edd9ef-1ccf-429a-8f8f-49950b9207f8
    artifacts:
      - /tmp/export/*.ipa
